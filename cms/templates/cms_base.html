<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FOSSEE | {{ page.title|title }}</title>
    
    <!-- Google Fonts & Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <link rel="stylesheet" href="{% static 'cms/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'workshop_app/css/base.css' %}" type="text/css"/>

    <script src="{% static 'cms/js/jquery-3.4.1.slim.min.js' %}"></script>
    <script src="{% static 'cms/js/popper.min.js' %}"></script>
    {{ page.imports | safe }}
    <script src="{% static 'cms/js/bootstrap.min.js' %}"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top shadow-sm animate__animated animate__fadeInDown">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="{% static 'workshop_app/img/fossee_logo.png' %}" alt="Logo" height="32" class="me-2">
            <span class="ms-2">Workshops</span>
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent">
            <span class="material-icons-round">menu</span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/workshop/types/">Workshops</a></li>
                {% if user.is_authenticated %}
                    <li class="nav-item ms-lg-3">
                        <a href="/dashboard" class="btn btn-primary btn-sm px-4 ripple-effect">Dashboard</a>
                    </li>
                {% else %}
                    <li class="nav-item ms-lg-3">
                        <a href="{% url 'workshop_app:login' %}" class="btn btn-primary btn-sm px-4 ripple-effect">Sign In</a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<div class="base-content animate__animated animate__fadeIn">
    {{ page.content | safe }}
</div>

<footer class="footer mt-auto py-4 animate__animated animate__fadeIn">
    <div class="container text-center">
        <img src="{% static 'workshop_app/img/iitb_logo.png' %}" alt="IITB" height="40" class="mb-3 opacity-75">
        <p class="mb-0 text-muted small">&copy; 2026 FOSSEE, IIT Bombay. All rights reserved.</p>
    </div>
</footer>
</body>
</html>
